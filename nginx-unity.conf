server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve the Unity WebGL build ONLY under /godgame/
  location = /godgame {
    return 301 /godgame/;
  }

  location ^~ /godgame/ {
    # Unity build lives at /usr/share/nginx/html/godgame/...
    try_files $uri $uri/ /godgame/index.html;
  }

  # Unity WebGL builds often ship precompressed assets (e.g. .wasm.gz, .data.gz, .js.gz).
  # Nginx otherwise serves these as application/gzip, which breaks Unity's loader.
  location ~* \.wasm\.gz$ {
    default_type application/wasm;
    add_header Content-Encoding gzip;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~* \.data\.gz$ {
    default_type application/octet-stream;
    add_header Content-Encoding gzip;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~* \.js\.gz$ {
    default_type application/javascript;
    add_header Content-Encoding gzip;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Cache static assets aggressively; keep HTML fresh.
  location = /godgame/index.html {
    add_header Cache-Control "no-cache";
  }

  location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Block everything else on this origin (optional, but matches your "only /godgame").
  location / {
    return 404;
  }
}

